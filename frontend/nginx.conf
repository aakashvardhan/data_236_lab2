gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # user-service handles: /auth /users /favorites /ai-assistant /uploads
    location /api/auth {
        proxy_pass http://user-service:8001/auth;
    }
    location /api/users {
        proxy_pass http://user-service:8001/users;
    }
    location /api/favorites {
        proxy_pass http://user-service:8001/favorites;
    }
    location /api/ai-assistant {
        proxy_pass http://user-service:8001/ai-assistant;
    }
    location /api/uploads/restaurant_photos {
        proxy_pass http://restaurant-service:8002/uploads/restaurant_photos;
    }
    location /api/uploads {
        proxy_pass http://user-service:8001/uploads;
    }

    # review-service: create/list reviews nested under a restaurant
    location ~ ^/api/restaurants/[^/]+/reviews {
        rewrite ^/api(.+)$ $1 break;
        proxy_pass http://review-service:8004;
    }

    # restaurant-service: all other /restaurants/* routes
    location /api/restaurants {
        proxy_pass http://restaurant-service:8002/restaurants;
    }

    # review-service: update/delete by review id
    location /api/reviews {
        proxy_pass http://review-service:8004/reviews;
    }

    # restaurant-owner-service: /owner
    location /api/owner {
        proxy_pass http://restaurant-owner-service:8003/owner;
    }
}
