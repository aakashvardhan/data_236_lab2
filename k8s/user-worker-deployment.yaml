apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-worker
  labels:
    app: user-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-worker
  template:
    metadata:
      labels:
        app: user-worker
    spec:
      nodeSelector:
        karpenter.sh/nodepool: general-purpose
      containers:
        - name: user-worker
          image: 463310123657.dkr.ecr.us-east-2.amazonaws.com/user-worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
