services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic review.created --partitions 1 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic review.updated --partitions 1 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic review.deleted --partitions 1 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic restaurant.created --partitions 1 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic restaurant.updated --partitions 1 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic restaurant.claimed --partitions 1 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user.created --partitions 1 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user.updated --partitions 1 --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic booking.status --partitions 1 --replication-factor 1 &&
       echo 'All Kafka topics created.'"
    restart: "no"

  user-service:
    build: ./services/user-service
    ports:
      - "8001:8001"
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: yelp_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-super-secret-change-me}
      KAFKA_BROKER: kafka:9092
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:80
      TAVILY_API_KEY: ${TAVILY_API_KEY:-dummy}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-dummy}
      HF_API_TOKEN: ${HF_API_TOKEN:-dummy}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  restaurant-service:
    build: ./services/restaurant-service
    ports:
      - "8002:8002"
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: yelp_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-super-secret-change-me}
      KAFKA_BROKER: kafka:9092
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:80
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  restaurant-owner-service:
    build: ./services/restaurant-owner-service
    ports:
      - "8003:8003"
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: yelp_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-super-secret-change-me}
      KAFKA_BROKER: kafka:9092
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:80
    depends_on:
      mongodb:
        condition: service_healthy

  review-service:
    build: ./services/review-service
    ports:
      - "8004:8004"
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: yelp_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-super-secret-change-me}
      KAFKA_BROKER: kafka:9092
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:80
    depends_on:
      mongodb:
        condition: service_healthy

  review-worker:
    build: ./services/workers/review-worker
    environment:
      KAFKA_BROKER: kafka:9092
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: yelp_db
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  restaurant-worker:
    build: ./services/workers/restaurant-worker
    environment:
      KAFKA_BROKER: kafka:9092
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: yelp_db
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  user-worker:
    build: ./services/workers/user-worker
    environment:
      KAFKA_BROKER: kafka:9092
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: yelp_db
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - user-service
      - restaurant-service
      - restaurant-owner-service
      - review-service

volumes:
  mongo_data:
  uploads:
